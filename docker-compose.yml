services:
  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:-}
        NEXT_PUBLIC_AUTH_REDIRECT_ORIGIN: ${NEXT_PUBLIC_AUTH_REDIRECT_ORIGIN:-}
        NEXT_PUBLIC_MASTER_EMAIL: ${NEXT_PUBLIC_MASTER_EMAIL:-}
    env_file:
      - path: .env.local
        required: false
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "${APP_PORT:-3000}:3000"
